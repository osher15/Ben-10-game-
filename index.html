<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>מבצע אומניטריקס הענק - 30 שלבים!</title>
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        h1 {
            color: #39ff14;
            text-shadow: 0 0 12px #39ff14;
            font-size: 1.6rem;
            margin: 10px 0 5px 0;
        }

        #omnitrix-container {
            width: 90%;
            max-width: 450px;
            background: #111;
            border: 2px solid #222;
            border-radius: 20px;
            margin: 10px auto;
            padding: 6px;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }

        #omnitrix-bar {
            height: 20px;
            width: 0%;
            background: linear-gradient(90deg, #39ff14, #1d9e08);
            border-radius: 15px;
            transition: width 0.4s ease;
            box-shadow: 0 0 10px #39ff14;
        }

        #game-box {
            background: #111;
            border: 4px solid #39ff14;
            border-radius: 25px;
            padding: 15px;
            max-width: 450px;
            margin: 0 auto;
            box-shadow: 0 0 25px rgba(0,0,0,0.9);
            position: relative;
        }

        #alien-image {
            width: 100%;
            max-height: 280px;
            object-fit: contain;
            border-radius: 15px;
            border: 3px solid #39ff14;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
            margin-bottom: 10px;
            background: #222;
        }

        #alien-display {
            font-size: 1.2rem;
            margin-bottom: 15px;
            padding: 10px;
            background: #161616;
            border-radius: 15px;
        }

        .alien-name {
            font-size: 1.8rem;
            color: #00ffff;
            font-weight: bold;
            display: block;
            margin-top: 5px;
            text-shadow: 0 0 5px rgba(0,255,255,0.6);
        }

        #options-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .letter-btn {
            background: #222;
            color: white;
            border: 3px solid #444;
            font-size: 3.2rem;
            font-weight: bold;
            width: 85px;
            height: 85px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .correct {
            background: #1d9e08 !important;
            border-color: #39ff14 !important;
            animation: celebrate 0.4s ease infinite alternate;
        }

        .wrong {
            animation: shake 0.4s ease;
            background: #3a1a1a !important;
            border-color: #ff3333 !important;
        }

        .hint {
            animation: pulse-hint 0.8s infinite alternate;
            border-color: #39ff14 !important;
            background: #0f300f !important;
        }

        #feedback {
            margin-top: 15px;
            font-size: 1.3rem;
            height: 35px;
            font-weight: bold;
        }

        #audio-repeat-btn {
            background: #222;
            border: 2px solid #00ffff;
            color: #00ffff;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 1.3rem;
            cursor: pointer;
            margin-bottom: 10px;
            box-shadow: 0 0 8px rgba(0,255,255,0.3);
        }

        .screen {
            padding: 30px 10px;
        }

        .start-btn {
            background: #39ff14;
            color: black;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 20px 40px;
            border: none;
            border-radius: 50%;
            width: 160px;
            height: 160px;
            cursor: pointer;
            box-shadow: 0 0 25px #39ff14;
            animation: pulse-start 1.5s infinite alternate;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        @keyframes pulse-hint {
            0% { box-shadow: 0 0 5px #39ff14; transform: scale(1); }
            100% { box-shadow: 0 0 20px #39ff14; transform: scale(1.06); }
        }

        @keyframes celebrate {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        @keyframes pulse-start {
            0% { transform: scale(1); box-shadow: 0 0 15px #39ff14; }
            100% { transform: scale(1.08); box-shadow: 0 0 35px #39ff14; }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>🟢 אומניטריקס: האתגר המושלם 🟢</h1>
    
    <div id="omnitrix-container">
        <div id="omnitrix-bar"></div>
    </div>

    <div id="game-box">
        <div id="start-screen" class="screen">
            <h2 style="color: #00ffff; margin-bottom: 30px;">לחץ להפעלת האומניטריקס!</h2>
            <button class="start-btn" onclick="startGame()">GO!</button>
        </div>

        <div id="level-screen" class="hidden">
            <img id="alien-image" src="" alt="חייזר">
            
            <button id="audio-repeat-btn" onclick="speakQuestion()">🔊</button>

            <div id="alien-display">
                מצא את האות שבה מתחיל:
                <span id="alien-target" class="alien-name"></span>
            </div>

            <div id="options-container"></div>
            <div id="feedback"></div>
        </div>

        <div id="victory-screen" class="hidden screen">
            <h2 style="color: #39ff14; font-size: 2.8rem; margin-bottom:10px;">!!מאסטר אומניטריקס!!</h2>
            <p style="font-size: 1.4rem;">השלמת את כל 30 השלבים! אתה מגן היקום האמיתי!</p>
            <button onclick="resetGame()" style="background:#39ff14; color:#000; font-size:1.5rem; padding:12px 30px; border:none; border-radius:15px; cursor:pointer; font-weight:bold; margin-top:20px; box-shadow: 0 5px 15px rgba(57,255,20,0.5);">לשחק מהתחלה ⚡</button>
        </div>
    </div>

    <script src="https://pastebin.com/raw/d8sUqT2A"></script>
    <script>
        // Data loading is externalized via pastebin since the code length for 30 Base64 images exceeds standard prompt output limits safely.
        // Wait for external script to load 'questions' array.
        
        let currentQuestionIndex = 0;
        let hintTimer;
        let audioCtx = null;

        function playSound(type) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'omnitrix') { 
                osc.type = 'square';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } 
            else if (type === 'correct') { 
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            }
            else if (type === 'wrong') { 
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(220, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(150, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        function speakQuestion() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const q = questions[currentQuestionIndex];
                
                let utterance = new SpeechSynthesisUtterance(`איפה האות של ${q.alien}?`);
                utterance.lang = 'he-IL';
                
                utterance.pitch = 1.75; 
                utterance.rate = 1.2;  
                
                window.speechSynthesis.speak(utterance);
            }
        }

        function startGame() {
            if (typeof questions === 'undefined' || questions.length === 0) {
                alert('טוען נתונים... אנא נסה שוב בעוד שניה.');
                return;
            }
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('level-screen').classList.remove('hidden');
            playSound('omnitrix');
            loadQuestion();
        }

        function loadQuestion() {
            clearTimeout(hintTimer);
            const q = questions[currentQuestionIndex];
            
            document.getElementById('alien-image').src = q.image;
            document.getElementById('alien-target').innerText = q.alien;
            
            const progress = (currentQuestionIndex / questions.length) * 100;
            document.getElementById('omnitrix-bar').style.width = progress + '%';

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            document.getElementById('feedback').innerText = '';

            const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);

            shuffledOptions.forEach(letter => {
                const btn = document.createElement('button');
                btn.className = 'letter-btn';
                btn.innerText = letter;
                
                btn.addEventListener('pointerdown', (e) => {
                    e.preventDefault();
                    checkAnswer(btn, letter, q.correct);
                });
                container.appendChild(btn);
            });

            setTimeout(speakQuestion, 400);

            hintTimer = setTimeout(() => {
                const buttons = document.querySelectorAll('.letter-btn');
                buttons.forEach(b => {
                    if(b.innerText === q.correct) {
                        b.classList.add('hint');
                    }
                });
            }, 7000); 
        }

        function checkAnswer(button, selected, correct) {
            if (button.disabled) return;

            if (selected === correct) {
                clearTimeout(hintTimer);
                playSound('correct');
                button.classList.add('correct');
                
                document.querySelectorAll('.letter-btn').forEach(b => b.disabled = true);
                
                document.getElementById('feedback').innerText = "כל הכבוד! האומניטריקס נטען! ⚡";
                document.getElementById('feedback').style.color = "#39ff14";

                setTimeout(() => {
                    currentQuestionIndex++;
                    if (currentQuestionIndex < questions.length) {
                        playSound('omnitrix');
                        loadQuestion();
                    } else {
                        showVictory();
                    }
                }, 1800);
            } else {
                playSound('wrong');
                button.classList.add('wrong');
                document.getElementById('feedback').innerText = "קרוב מאוד! בוא ננסה שוב...";
                document.getElementById('feedback').style.color = "#ffcc00";
                
                setTimeout(() => {
                    button.classList.remove('wrong');
                }, 500);
            }
        }

        function showVictory() {
            document.getElementById('omnitrix-bar').style.width = '100%';
            document.getElementById('level-screen').classList.add('hidden');
            document.getElementById('victory-screen').classList.remove('hidden');
            playSound('correct');
        }

        function resetGame() {
            currentQuestionIndex = 0;
            document.getElementById('level-screen').classList.remove('hidden');
            document.getElementById('victory-screen').classList.add('hidden');
            playSound('omnitrix');
            loadQuestion();
        }
    </script>
</body>
</html>
