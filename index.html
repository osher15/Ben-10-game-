<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>מבצע אומניטריקס - האוסף המלא!</title>
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        h1 {
            color: #39ff14;
            text-shadow: 0 0 12px #39ff14;
            font-size: 1.5rem;
            margin: 10px 0 5px 0;
        }

        #omnitrix-container {
            width: 90%;
            max-width: 450px;
            background: #111;
            border: 2px solid #222;
            border-radius: 20px;
            margin: 10px auto;
            padding: 6px;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }

        #omnitrix-bar {
            height: 20px;
            width: 0%;
            background: linear-gradient(90deg, #39ff14, #1d9e08);
            border-radius: 15px;
            transition: width 0.4s ease;
            box-shadow: 0 0 10px #39ff14;
        }

        #game-box {
            background: #111;
            border: 4px solid #39ff14;
            border-radius: 25px;
            padding: 15px;
            max-width: 450px;
            margin: 0 auto;
            box-shadow: 0 0 25px rgba(0,0,0,0.9);
            position: relative;
        }

        #alien-image {
            width: 100%;
            max-height: 280px;
            object-fit: contain;
            border-radius: 15px;
            border: 3px solid #39ff14;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
            margin-bottom: 10px;
            background: #151515;
        }

        #alien-display {
            font-size: 1.2rem;
            margin-bottom: 15px;
            padding: 10px;
            background: #161616;
            border-radius: 15px;
        }

        .alien-name {
            font-size: 1.8rem;
            color: #00ffff;
            font-weight: bold;
            display: block;
            margin-top: 5px;
            text-shadow: 0 0 5px rgba(0,255,255,0.6);
        }

        #options-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .letter-btn {
            background: #222;
            color: white;
            border: 3px solid #444;
            font-size: 3.2rem;
            font-weight: bold;
            width: 85px;
            height: 85px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .correct {
            background: #1d9e08 !important;
            border-color: #39ff14 !important;
            animation: celebrate 0.4s ease infinite alternate;
        }

        .wrong {
            animation: shake 0.4s ease;
            background: #3a1a1a !important;
            border-color: #ff3333 !important;
        }

        .hint {
            animation: pulse-hint 0.8s infinite alternate;
            border-color: #39ff14 !important;
            background: #0f300f !important;
        }

        #feedback {
            margin-top: 15px;
            font-size: 1.3rem;
            height: 35px;
            font-weight: bold;
        }

        #audio-repeat-btn {
            background: #222;
            border: 2px solid #00ffff;
            color: #00ffff;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 1.3rem;
            cursor: pointer;
            margin-bottom: 10px;
            box-shadow: 0 0 8px rgba(0,255,255,0.3);
        }

        .screen {
            padding: 30px 10px;
        }

        .start-btn {
            background: #39ff14;
            color: black;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 20px 40px;
            border: none;
            border-radius: 50%;
            width: 160px;
            height: 160px;
            cursor: pointer;
            box-shadow: 0 0 25px #39ff14;
            animation: pulse-start 1.5s infinite alternate;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        @keyframes pulse-hint {
            0% { box-shadow: 0 0 5px #39ff14; transform: scale(1); }
            100% { box-shadow: 0 0 20px #39ff14; transform: scale(1.06); }
        }

        @keyframes celebrate {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        @keyframes pulse-start {
            0% { transform: scale(1); box-shadow: 0 0 15px #39ff14; }
            100% { transform: scale(1.08); box-shadow: 0 0 35px #39ff14; }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>🟢 אומניטריקס: האתגר המלא (28 שלבים) 🟢</h1>
    
    <div id="omnitrix-container">
        <div id="omnitrix-bar"></div>
    </div>

    <div id="game-box">
        <div id="start-screen" class="screen">
            <h2 style="color: #00ffff; margin-bottom: 30px;">לחץ להפעלת האומניטריקס!</h2>
            <button class="start-btn" onclick="startGame()">GO!</button>
        </div>

        <div id="level-screen" class="hidden">
            <img id="alien-image" src="" alt="חייזר">
            
            <button id="audio-repeat-btn" onclick="speakQuestion()">🔊</button>

            <div id="alien-display">
                מצא את האות שבה מתחיל:
                <span id="alien-target" class="alien-name"></span>
            </div>

            <div id="options-container"></div>
            <div id="feedback"></div>
        </div>

        <div id="victory-screen" class="hidden screen">
            <h2 style="color: #39ff14; font-size: 2.8rem; margin-bottom:10px;">!!אומניטריקס מלא!!</h2>
            <p style="font-size: 1.4rem;">הצלת את כל 28 החייזרים ולמדת את כל האותיות בהצלחה!</p>

        </div>
    </div>
